name: aikart

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE: /
    image: aikart-web:latest
    container_name: aikart-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
