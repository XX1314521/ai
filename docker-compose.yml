name: aikart

services:
  app-db:
    image: postgres:16-alpine
    container_name: aikart-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AIKART_DB_NAME:-aikart}
      POSTGRES_USER: ${AIKART_DB_USER:-aikart}
      POSTGRES_PASSWORD: ${AIKART_DB_PASSWORD:?请在 .env 设置 AIKART_DB_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - aikart_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [aikart]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: aikart-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?请在 .env 设置 MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?请在 .env 设置 MINIO_SECRET_KEY}
      TZ: Asia/Shanghai
    volumes:
      - aikart_minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [aikart]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: aikart-api:latest
    container_name: aikart-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 4000
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-https://canvas.ikui.cn}
      DATABASE_URL: postgresql://${AIKART_DB_USER:-aikart}:${AIKART_DB_PASSWORD}@app-db:5432/${AIKART_DB_NAME:-aikart}
      BILLING_DATABASE_URL: ${BILLING_DATABASE_URL:?请在 .env 设置爱坤Ai PostgreSQL 连接}
      NEW_API_QUOTA_PER_UNIT: ${AIKUN_AI_QUOTA_PER_UNIT:-500000}
      PLATFORM_ADMIN_NEW_API_USER_ID: ${PLATFORM_ADMIN_AIKUN_USER_ID:-1}
      SESSION_SECRET: ${SESSION_SECRET:?请在 .env 设置 SESSION_SECRET}
      CONTENT_ENCRYPTION_KEY: ${CONTENT_ENCRYPTION_KEY:?请在 .env 设置 CONTENT_ENCRYPTION_KEY}
      SESSION_DAYS: ${SESSION_DAYS:-30}
      DRAFT_RETENTION_DAYS: ${DRAFT_RETENTION_DAYS:-7}
      CLEANUP_INTERVAL_MINUTES: ${CLEANUP_INTERVAL_MINUTES:-360}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-100}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BUCKET: ${MINIO_BUCKET:-aikart-media}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks: [aikart]

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BASE: /
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    image: aikart-web:latest
    container_name: aikart-web
    restart: unless-stopped
    ports:
      - "${WEB_BIND_IP:-127.0.0.1}:${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks: [aikart]

  backup:
    build:
      context: .
      dockerfile: docker/backup.Dockerfile
    image: aikart-backup:latest
    container_name: aikart-backup
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${AIKART_DB_USER:-aikart}:${AIKART_DB_PASSWORD}@app-db:5432/${AIKART_DB_NAME:-aikart}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-aikart-media}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      TZ: Asia/Shanghai
    volumes:
      - ./backups:/backups
    depends_on:
      app-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [aikart]

networks:
  aikart:

volumes:
  aikart_postgres_data:
  aikart_minio_data:
