server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        access_log off;
    }

    location ~* \.(?:avif|gif|ico|jpe?g|png|svg|webp|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    location = /index.html {
        expires -1;
        try_files $uri =404;
    }

    # React Router routes such as /commerce and /canvas must return index.html.
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
